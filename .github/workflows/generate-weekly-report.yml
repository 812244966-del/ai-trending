name: Generate Weekly Report

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate report
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            npm run report:generate -- --date "${{ github.event.inputs.report_date }}"
          else
            npm run report:generate
          fi

      - name: Commit generated files
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No report updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/reports/latest.ts src/data/reports/archive.ts public/reports
          git commit -m "Generate weekly report"
          git push origin main
